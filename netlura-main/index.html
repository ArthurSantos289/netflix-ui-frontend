<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="conteudo-principal">
        <h1>Quem está assistindo?</h1>
        <ul class="lista-perfis">
            
            <li class="item-perfil">
                <a href="catalogo/catalogo-arthur.html" class="perfil">
                    <figure class="avatar-container">
                        <span class="imagem-perfil tema-arthur" aria-hidden="true">
                            <span class="icone-avatar">
                                <img src="assets/perfil-1.jpg" alt="Perfil de Arthur" width="128" height="128">
                            </span>
                        </span>
                        <figcaption class="nome-perfil">Arthur</figcaption>
                    </figure>
                </a>
            </li>

            <li class="item-perfil">
                <a href="catalogo/catalogo-joao.html" class="perfil">
                    <figure class="avatar-container">
                        <span class="imagem-perfil tema-joao" aria-hidden="true">
                            <span class="icone-avatar">
                                <img src="assets/perfil-2.jpg" alt="Perfil de João" width="128" height="128">
                            </span>
                        </span>
                        <figcaption class="nome-perfil">João Vitor</figcaption>
                    </figure>
                </a>
            </li>

            <li class="item-perfil">
                <a href="catalogo/catalogo-mateus.html" class="perfil">
                    <figure class="avatar-container">
                        <span class="imagem-perfil tema-mateus" aria-hidden="true">
                            <span class="icone-avatar">
                                <img src="assets/perfil-3.jpg" alt="Perfil de Mateus" width="128" height="128">
                            </span>
                        </span>
                        <figcaption class="nome-perfil">Mateus</figcaption>
                    </figure>
                </a>
            </li>

            <li class="item-perfil">
                <a href="catalogo/catalogo-joaoG.html" class="perfil">
                    <figure class="avatar-container">
                        <span class="imagem-perfil tema-joaoG" aria-hidden="true">
                            <span class="icone-avatar">
                                <img src="assets/perfil-4.jpg" alt="Perfil de João Gabriel" width="128" height="128">
                            </span>
                        </span>
                        <figcaption class="nome-perfil">João Gabriel</figcaption>
                    </figure>
                </a>
            </li>

        </ul>

        <section class="gerenciar">
            <button type="button" class="botao-gerenciar">Gerenciar perfis</button>
        </section>

    </main>

    <script src="js/index.js"></script>
</body>
</html>
